name: Pack Smoke Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pack-smoke:
    name: OpenClaw Brain OS pack smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run pack smoke test
        run: bash packs/openclaw-brain-os/tests/smoke.sh
